services:
  - type: web
    name: price-search-api
    runtime: node
    rootDir: .
    buildCommand: bash ./scripts/render-build.sh
    startCommand: node --enable-source-maps ./api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: price-search-db
          property: connectionString
      - key: SERPER_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: FIRECRAWL_API_KEY
        sync: false
      - key: EXA_API_KEY
        sync: false
      - key: BROWSE_AI_API_KEY
        sync: false
      - key: BROWSE_AI_SEARCH_URL
        sync: false
      - key: BROWSER_USE_API_KEY
        sync: false
      - key: BROWSER_USE_SEARCH_URL
        sync: false
      - key: OLOSTEP_API_KEY
        sync: false
      - key: OLOSTEP_SEARCH_URL
        sync: false
      - key: CLOD_API_KEY
        sync: false
      - key: CLOD_SEARCH_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false

databases:
  - name: price-search-db
    databaseName: price_search
    user: price_search
    plan: free
