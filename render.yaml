services:
  - type: web
    name: price-search-api
    runtime: node
    rootDir: .
    buildCommand: npm install -g pnpm && pnpm install --no-frozen-lockfile && pnpm --filter @workspace/api-server build
    startCommand: node --enable-source-maps ./api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: price-search-db
          property: connectionString
      - key: SERPER_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: FIRECRAWL_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: OPENROUTER_KEY
        sync: false

databases:
  - name: price-search-db
    databaseName: price_search
    user: price_search
    plan: free
